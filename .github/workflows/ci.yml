name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Airflow (minimal for import)
        run: |
          pip install apache-airflow==2.9.3 --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.3/constraints-3.11.txt"
          pip install apache-airflow-providers-http apache-airflow-providers-celery apache-airflow-providers-postgres

      - name: Lint with flake8
        run: |
          flake8 dags/ --max-line-length=120 --ignore=E501,W503,E402

      - name: Validate DAG structure
        run: |
          export AIRFLOW_HOME=/tmp/airflow
          mkdir -p $AIRFLOW_HOME
          airflow db init 2>/dev/null || true
          python -c "
          import sys
          sys.path.insert(0, 'dags')
          from extract_exchange_rates import dag as d1
          from extract_worldbank_indicators import dag as d2
          from transform_and_load_warehouse import dag as d3
          from data_pipeline_monitoring import dag as d4
          print(f'DAGs loaded: {d1.dag_id}, {d2.dag_id}, {d3.dag_id}, {d4.dag_id}')
          "

      - name: Run tests
        run: |
          export AIRFLOW_HOME=/tmp/airflow
          pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t airflow-etl-pipeline .

      - name: Verify image
        run: docker run --rm airflow-etl-pipeline airflow version
